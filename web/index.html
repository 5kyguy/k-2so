<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>K-2SO</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0f1115;
        --panel: #171a21;
        --text: #e8eaed;
        --muted: #9aa0a6;
        --accent: #7eb8da;
        --ok: #6fbf8a;
        --warn: #e0b060;
        --err: #e07070;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: system-ui, sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
      }
      header {
        padding: 1rem 1.5rem;
        border-bottom: 1px solid #252830;
        display: flex;
        align-items: baseline;
        gap: 0.75rem;
        flex-wrap: wrap;
      }
      header h1 { margin: 0; font-size: 1.25rem; }
      header span { color: var(--muted); font-size: 0.9rem; }
      nav {
        display: flex;
        gap: 0.35rem;
        margin-left: auto;
      }
      nav button {
        background: transparent;
        border: 1px solid #2a2f3a;
        color: var(--muted);
        border-radius: 6px;
        padding: 0.35rem 0.7rem;
        cursor: pointer;
        font-size: 0.85rem;
      }
      nav button.active {
        color: var(--text);
        border-color: var(--accent);
        background: #1c212b;
      }
      main { padding: 1rem; }
      .view { display: none; }
      .view.active { display: block; }
      .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
      .grid-mem { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
      @media (max-width: 900px) {
        .grid-2, .grid-mem { grid-template-columns: 1fr; }
      }
      section, .card {
        background: var(--panel);
        border: 1px solid #252830;
        border-radius: 8px;
        padding: 1rem;
      }
      h2 {
        margin: 0 0 0.75rem;
        font-size: 0.95rem;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }
      .task {
        border: 1px solid #2a2f3a;
        border-radius: 6px;
        padding: 0.75rem;
        margin-bottom: 0.5rem;
        cursor: pointer;
      }
      .task:hover { border-color: var(--accent); }
      .task.selected { border-color: var(--accent); background: #1c212b; }
      .task-header { display: flex; align-items: center; justify-content: space-between; gap: 0.5rem; }
      .abort {
        border: 1px solid var(--err);
        background: transparent;
        color: var(--err);
        border-radius: 4px;
        font-size: 0.75rem;
        padding: 0.15rem 0.45rem;
        cursor: pointer;
      }
      .abort:hover { background: rgba(224, 112, 112, 0.12); }
      .status { font-size: 0.75rem; font-weight: 600; text-transform: uppercase; }
      .status.queued { color: var(--muted); }
      .status.running { color: var(--accent); }
      .status.done { color: var(--ok); }
      .status.failed, .status.aborted { color: var(--err); }
      .instruction { margin-top: 0.35rem; font-size: 0.9rem; }
      #events, .raw-panel {
        font-family: ui-monospace, monospace;
        font-size: 0.8rem;
        max-height: 70vh;
        overflow: auto;
        white-space: pre-wrap;
      }
      .empty { color: var(--muted); font-size: 0.9rem; }
      .mem-card {
        cursor: pointer;
        min-height: 8rem;
      }
      .mem-card:hover { border-color: var(--accent); }
      .mem-card.expanded { border-color: var(--accent); grid-column: 1 / -1; }
      .mem-preview {
        font-size: 0.85rem;
        color: var(--muted);
        white-space: pre-wrap;
        max-height: 6rem;
        overflow: hidden;
      }
      .mem-path { font-size: 0.75rem; color: var(--accent); margin-bottom: 0.5rem; word-break: break-all; }
      .skill-item {
        border-top: 1px solid #2a2f3a;
        padding: 0.5rem 0;
        cursor: pointer;
      }
      .skill-item:first-child { border-top: none; padding-top: 0; }
      .skill-name { font-weight: 600; font-size: 0.9rem; }
      .skill-trigger { font-size: 0.8rem; color: var(--muted); }
      .reflection-entry {
        border: 1px solid #2a2f3a;
        border-radius: 6px;
        padding: 0.75rem;
        margin-bottom: 0.5rem;
        font-size: 0.85rem;
      }
      .reflection-entry .meta { color: var(--muted); font-size: 0.75rem; margin-bottom: 0.35rem; }
      .reflection-entry.error { border-color: var(--err); }
      .reflection-entry pre {
        margin: 0.35rem 0 0;
        font-family: ui-monospace, monospace;
        font-size: 0.75rem;
        white-space: pre-wrap;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>K-2SO</h1>
      <span>background tasks</span>
      <nav>
        <button type="button" class="active" data-view="tasks">Tasks</button>
        <button type="button" data-view="memory">Memory</button>
        <button type="button" data-view="reflection">Reflection</button>
      </nav>
    </header>
    <main>
      <div id="view-tasks" class="view active grid-2">
        <section>
          <h2>Tasks</h2>
          <div id="tasks" class="empty">Loading…</div>
        </section>
        <section>
          <h2>Activity</h2>
          <div id="events" class="empty">Select a task</div>
        </section>
      </div>
      <div id="view-memory" class="view">
        <div id="memory-grid" class="grid-mem empty">Loading memory…</div>
      </div>
      <div id="view-reflection" class="view">
        <section>
          <h2>Reflection log</h2>
          <div id="reflection-log" class="empty">Loading…</div>
        </section>
      </div>
    </main>
    <script src="/app.js"></script>
  </body>
</html>
