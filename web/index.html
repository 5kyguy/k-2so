<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>K-2SO</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0c0e12;
        --bg-elevated: #12151c;
        --panel: #171b24;
        --panel-hover: #1c212c;
        --border: #2a3040;
        --border-subtle: #222733;
        --text: #e8eaed;
        --muted: #8b939e;
        --accent: #7eb8da;
        --accent-dim: rgba(126, 184, 218, 0.12);
        --ok: #6fbf8a;
        --ok-dim: rgba(111, 191, 138, 0.12);
        --warn: #e0b060;
        --warn-dim: rgba(224, 176, 96, 0.12);
        --err: #e07070;
        --err-dim: rgba(224, 112, 112, 0.12);
        --mono: ui-monospace, "Cascadia Code", "SF Mono", Menlo, monospace;
        --radius: 8px;
        --radius-sm: 6px;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: system-ui, -apple-system, sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
        line-height: 1.45;
      }
      header {
        padding: 0.85rem 1.25rem;
        border-bottom: 1px solid var(--border-subtle);
        background: var(--bg-elevated);
        display: flex;
        align-items: center;
        gap: 1rem;
        flex-wrap: wrap;
      }
      .brand {
        display: flex;
        align-items: baseline;
        gap: 0.6rem;
      }
      header h1 {
        margin: 0;
        font-size: 1.15rem;
        font-weight: 650;
        letter-spacing: -0.02em;
      }
      .brand span { color: var(--muted); font-size: 0.82rem; }
      .stats {
        display: flex;
        gap: 0.5rem;
        flex-wrap: wrap;
      }
      .stat {
        font-size: 0.75rem;
        padding: 0.2rem 0.55rem;
        border-radius: 999px;
        border: 1px solid var(--border);
        color: var(--muted);
        background: var(--panel);
      }
      .stat strong { color: var(--text); font-weight: 600; }
      .stat.running strong { color: var(--accent); }
      .stat.queued strong { color: var(--warn); }
      .stat.done strong { color: var(--ok); }
      .stat.failed strong { color: var(--err); }
      .live {
        display: inline-flex;
        align-items: center;
        gap: 0.35rem;
        font-size: 0.75rem;
        color: var(--muted);
        margin-left: auto;
      }
      .live-dot {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: var(--muted);
      }
      .live.connected .live-dot {
        background: var(--ok);
        box-shadow: 0 0 6px var(--ok);
      }
      nav {
        display: flex;
        gap: 0.3rem;
      }
      nav button {
        background: transparent;
        border: 1px solid var(--border);
        color: var(--muted);
        border-radius: var(--radius-sm);
        padding: 0.35rem 0.75rem;
        cursor: pointer;
        font-size: 0.82rem;
        transition: border-color 0.15s, color 0.15s, background 0.15s;
      }
      nav button:hover { color: var(--text); border-color: #3a4254; }
      nav button.active {
        color: var(--text);
        border-color: var(--accent);
        background: var(--accent-dim);
      }
      main { padding: 1rem 1.25rem 1.5rem; }
      .view { display: none; }
      .view.active { display: block; }
      .tasks-layout {
        display: grid;
        grid-template-columns: minmax(280px, 360px) 1fr;
        gap: 1rem;
        align-items: start;
      }
      @media (max-width: 960px) {
        .tasks-layout { grid-template-columns: 1fr; }
      }
      section, .card {
        background: var(--panel);
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius);
      }
      section { padding: 0.85rem; }
      .section-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 0.65rem;
      }
      h2 {
        margin: 0;
        font-size: 0.72rem;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.06em;
        font-weight: 600;
      }
      .task-count {
        font-size: 0.72rem;
        color: var(--muted);
      }
      .task-list {
        display: flex;
        flex-direction: column;
        gap: 0.45rem;
        max-height: calc(100vh - 9rem);
        overflow-y: auto;
        padding-right: 0.15rem;
      }
      .task {
        border: 1px solid var(--border);
        border-radius: var(--radius-sm);
        padding: 0.65rem 0.75rem;
        cursor: pointer;
        background: var(--bg-elevated);
        transition: border-color 0.15s, background 0.15s;
      }
      .task:hover { border-color: #3a4254; background: var(--panel-hover); }
      .task.selected {
        border-color: var(--accent);
        background: var(--accent-dim);
      }
      .task-top {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 0.5rem;
        margin-bottom: 0.35rem;
      }
      .task-meta-row {
        display: flex;
        align-items: center;
        gap: 0.4rem;
        flex-wrap: wrap;
      }
      .pill {
        display: inline-flex;
        align-items: center;
        gap: 0.3rem;
        font-size: 0.68rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.03em;
        padding: 0.12rem 0.45rem;
        border-radius: 999px;
      }
      .pill::before {
        content: "";
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: currentColor;
      }
      .pill.queued { color: var(--muted); background: #1e222c; }
      .pill.running { color: var(--accent); background: var(--accent-dim); }
      .pill.done { color: var(--ok); background: var(--ok-dim); }
      .pill.failed, .pill.aborted { color: var(--err); background: var(--err-dim); }
      .task-id {
        font-family: var(--mono);
        font-size: 0.68rem;
        color: var(--muted);
      }
      .task-time {
        font-size: 0.72rem;
        color: var(--muted);
        margin-left: auto;
      }
      .instruction {
        font-size: 0.86rem;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
        line-height: 1.4;
      }
      .task-stats {
        display: flex;
        gap: 0.65rem;
        margin-top: 0.4rem;
        font-size: 0.7rem;
        color: var(--muted);
      }
      .abort {
        border: 1px solid var(--err);
        background: transparent;
        color: var(--err);
        border-radius: 4px;
        font-size: 0.68rem;
        padding: 0.12rem 0.4rem;
        cursor: pointer;
        flex-shrink: 0;
      }
      .abort:hover { background: var(--err-dim); }
      .detail-panel {
        display: flex;
        flex-direction: column;
        gap: 0.75rem;
        max-height: calc(100vh - 7rem);
      }
      .detail-empty {
        padding: 2.5rem 1rem;
        text-align: center;
        color: var(--muted);
        font-size: 0.9rem;
      }
      .meta-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
        gap: 0.5rem 1rem;
        padding: 0.85rem;
      }
      .meta-item label {
        display: block;
        font-size: 0.68rem;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.04em;
        margin-bottom: 0.15rem;
      }
      .meta-item span, .meta-item code {
        font-size: 0.82rem;
        word-break: break-all;
      }
      .meta-item code {
        font-family: var(--mono);
        font-size: 0.75rem;
        background: var(--bg);
        padding: 0.1rem 0.3rem;
        border-radius: 4px;
      }
      .meta-link {
        color: var(--accent);
        cursor: pointer;
        text-decoration: underline;
        text-underline-offset: 2px;
      }
      .error-banner {
        margin: 0 0.85rem 0.85rem;
        padding: 0.65rem 0.75rem;
        border-radius: var(--radius-sm);
        background: var(--err-dim);
        border: 1px solid rgba(224, 112, 112, 0.35);
        color: #f0a0a0;
        font-size: 0.84rem;
      }
      .timeline-wrap {
        padding: 0 0.85rem 0.85rem;
        overflow-y: auto;
        flex: 1;
        min-height: 200px;
      }
      .timeline {
        position: relative;
        padding-left: 1.25rem;
      }
      .timeline::before {
        content: "";
        position: absolute;
        left: 0.35rem;
        top: 0.4rem;
        bottom: 0.4rem;
        width: 2px;
        background: var(--border);
        border-radius: 1px;
      }
      .tl-item {
        position: relative;
        margin-bottom: 0.75rem;
      }
      .tl-item:last-child { margin-bottom: 0; }
      .tl-dot {
        position: absolute;
        left: -1.05rem;
        top: 0.35rem;
        width: 9px;
        height: 9px;
        border-radius: 50%;
        background: var(--border);
        border: 2px solid var(--panel);
      }
      .tl-item.status .tl-dot { background: var(--accent); }
      .tl-item.message .tl-dot { background: #9b8fd4; }
      .tl-item.tool .tl-dot { background: var(--warn); }
      .tl-item.error .tl-dot, .tl-item.done.failed .tl-dot { background: var(--err); }
      .tl-item.done.ok .tl-dot { background: var(--ok); }
      .tl-head {
        display: flex;
        align-items: baseline;
        gap: 0.5rem;
        margin-bottom: 0.2rem;
      }
      .tl-type {
        font-size: 0.72rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }
      .tl-item.status .tl-type { color: var(--accent); }
      .tl-item.message .tl-type { color: #9b8fd4; }
      .tl-item.tool .tl-type { color: var(--warn); }
      .tl-item.error .tl-type { color: var(--err); }
      .tl-item.done.ok .tl-type { color: var(--ok); }
      .tl-time {
        font-size: 0.68rem;
        color: var(--muted);
        font-family: var(--mono);
      }
      .tl-body {
        font-size: 0.84rem;
        color: var(--text);
        white-space: pre-wrap;
        word-break: break-word;
      }
      .tl-body.muted { color: var(--muted); font-size: 0.8rem; }
      .tl-raw {
        margin-top: 0.35rem;
        font-family: var(--mono);
        font-size: 0.7rem;
        color: var(--muted);
        background: var(--bg);
        border: 1px solid var(--border-subtle);
        border-radius: 4px;
        padding: 0.45rem 0.55rem;
        white-space: pre-wrap;
        max-height: 8rem;
        overflow: auto;
        display: none;
      }
      .tl-item.expanded .tl-raw { display: block; }
      .tl-toggle {
        font-size: 0.68rem;
        color: var(--accent);
        cursor: pointer;
        border: none;
        background: none;
        padding: 0;
        margin-top: 0.2rem;
      }
      .grid-mem { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
      @media (max-width: 900px) {
        .grid-mem { grid-template-columns: 1fr; }
      }
      .empty { color: var(--muted); font-size: 0.88rem; padding: 0.5rem 0; }
      .mem-card {
        cursor: pointer;
        min-height: 8rem;
        padding: 1rem;
      }
      .mem-card:hover { border-color: var(--accent); }
      .mem-card.expanded { border-color: var(--accent); grid-column: 1 / -1; }
      .mem-preview {
        font-size: 0.85rem;
        color: var(--muted);
        white-space: pre-wrap;
        max-height: 6rem;
        overflow: hidden;
      }
      .raw-panel {
        font-family: var(--mono);
        font-size: 0.8rem;
        max-height: 70vh;
        overflow: auto;
        white-space: pre-wrap;
      }
      .mem-path { font-size: 0.75rem; color: var(--accent); margin-bottom: 0.5rem; word-break: break-all; }
      .skill-item {
        border-top: 1px solid var(--border);
        padding: 0.5rem 0;
        cursor: pointer;
      }
      .skill-item:first-child { border-top: none; padding-top: 0; }
      .skill-name { font-weight: 600; font-size: 0.9rem; }
      .skill-trigger { font-size: 0.8rem; color: var(--muted); }
      .reflection-entry {
        border: 1px solid var(--border);
        border-radius: var(--radius-sm);
        padding: 0.75rem;
        margin-bottom: 0.5rem;
        font-size: 0.85rem;
      }
      .reflection-entry .meta { color: var(--muted); font-size: 0.75rem; margin-bottom: 0.35rem; }
      .reflection-entry.error { border-color: var(--err); }
      .reflection-entry pre {
        margin: 0.35rem 0 0;
        font-family: var(--mono);
        font-size: 0.75rem;
        white-space: pre-wrap;
      }
    </style>
  </head>
  <body>
    <header>
      <div class="brand">
        <h1>K-2SO</h1>
        <span>background agent</span>
      </div>
      <div id="stats" class="stats"></div>
      <div id="live" class="live">
        <span class="live-dot"></span>
        <span class="live-label">connecting…</span>
      </div>
      <nav>
        <button type="button" class="active" data-view="tasks">Tasks</button>
        <button type="button" data-view="memory">Memory</button>
        <button type="button" data-view="reflection">Reflection</button>
      </nav>
    </header>
    <main>
      <div id="view-tasks" class="view active tasks-layout">
        <section>
          <div class="section-head">
            <h2>Tasks</h2>
            <span id="task-count" class="task-count"></span>
          </div>
          <div id="tasks" class="task-list empty">Loading…</div>
        </section>
        <div id="detail" class="detail-panel">
          <div class="detail-empty">Select a task to view activity</div>
        </div>
      </div>
      <div id="view-memory" class="view">
        <div id="memory-grid" class="grid-mem empty">Loading memory…</div>
      </div>
      <div id="view-reflection" class="view">
        <section>
          <h2>Reflection log</h2>
          <div id="reflection-log" class="empty">Loading…</div>
        </section>
      </div>
    </main>
    <script src="/app.js"></script>
  </body>
</html>
